<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>作品總覽｜聯邦藝術中心 Union Art Center</title>
    
    <style>
        :root {
            --ubot-red: #E60012;
            --ubot-blue: #003366;
            --ubot-light-blue: #EAF6FC;
            --ubot-sky-blue: #00A1E9;
            --text-dark: #333333;
            --text-gray: #666666;
            --border-color: #D1CDC4;
        }

        body {
            margin: 0;
            font-family: "Noto Sans TC", sans-serif;
            background-color: #f8fbfd;
            color: var(--text-dark);
            line-height: 1.8;
        }

        /* ===== 導覽列 ===== */
        header {
            background: #ffffff;
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
        }

        .logo a {
            font-size: 20px;
            font-weight: 800;
            color: var(--ubot-blue);
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .logo a::before { 
            content: ""; width: 8px; height: 8px; background: var(--ubot-red); 
            border-radius: 50%; margin-right: 8px; 
        }

        .menu { display: flex; list-style: none; margin: 0; padding: 0; }
        .menu li { margin-left: 10px; }
        .menu a {
            text-decoration: none; color: #666; font-weight: 600;
            font-size: 15px; padding: 8px 12px; transition: 0.3s;
        }
        .menu a:hover, .menu a.active { color: var(--ubot-red); }

        /* ===== Banner ===== */
        .page-banner {
            width: 100%;
            height: 250px;
            background: linear-gradient(rgba(0,51,102,0.6), rgba(0,51,102,0.6)), 
                        url('https://images.unsplash.com/photo-1518998053574-53f026344594?auto=format&fit=crop&w=1200');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        /* ===== 篩選器 (Sticky) ===== */
        .sticky-filter {
            background: #fff;
            padding: 20px 0;
            position: sticky;
            top: 64px;
            z-index: 900;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .search-container { max-width: 1200px; margin: 0 auto; padding: 0 20px 15px; }
        .search-bar {
            width: 100%; padding: 12px 15px; border: 1px solid #eee;
            border-radius: 10px; font-size: 15px; box-sizing: border-box;
            background: #f5f7f9;
        }

        .btn-group-scroll {
            display: flex; overflow-x: auto; padding: 0 20px; gap: 10px;
            max-width: 1200px; margin: 0 auto; scrollbar-width: none; 
        }
        .btn-group-scroll::-webkit-scrollbar { display: none; }

        .filter-btn {
            white-space: nowrap; padding: 8px 20px; background: #f0f2f5;
            border: none; border-radius: 20px; cursor: pointer; transition: 0.3s;
        }
        .filter-btn.active { background: var(--ubot-blue); color: #fff; }

        /* ===== 作品網格 ===== */
        .work-grid {
            display: grid; max-width: 1200px; margin: 0 auto;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px; padding: 40px 20px;
        }

        .work-card {
            background: #fff; border-radius: 12px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); transition: 0.3s; cursor: pointer;
        }
        .work-card:hover { transform: translateY(-5px); }

        .work-img-container { width: 100%; aspect-ratio: 4 / 3; overflow: hidden; }
        .work-img { width: 100%; height: 100%; background-size: cover; background-position: center; }

        .work-info { padding: 20px; }
        .work-tag { font-size: 11px; color: var(--ubot-red); font-weight: 700; }
        .work-title { font-size: 18px; font-weight: 700; margin: 5px 0; color: var(--ubot-blue); }
        .work-artist { font-size: 14px; color: var(--text-gray); }

        /* ===== 作品詳情彈窗 (Modal) ===== */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none;
            justify-content: center; align-items: center; z-index: 2000; padding: 20px;
        }
        .modal-content {
            background: white; width: 100%; max-width: 900px; max-height: 90vh;
            border-radius: 15px; overflow: hidden; display: flex; position: relative;
            animation: modalFade 0.3s ease;
        }
        @keyframes modalFade { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; z-index: 10; }

        .modal-img-side { flex: 1.2; background: #f9f9f9; display: flex; align-items: center; justify-content: center; }
        .modal-img-side img { width: 100%; height: 100%; object-fit: contain; }

        .modal-info-side { flex: 1; padding: 40px; overflow-y: auto; }
        .modal-info-side h2 { color: var(--ubot-blue); margin: 0 0 20px; border-bottom: 2px solid var(--ubot-red); display: inline-block; }
        
        .info-row { margin-bottom: 15px; font-size: 14px; }
        .info-label { font-weight: bold; color: #888; display: block; margin-bottom: 2px; }
        .info-value { color: #333; font-size: 16px; }
        .info-concept { margin-top: 20px; padding-top: 15px; border-top: 1px dashed #eee; color: #555; font-size: 15px; line-height: 1.8; }

        /* ===== 頁尾 ===== */
        footer { background: var(--ubot-light-blue); padding: 50px 20px 30px; margin-top: 60px; }
        .footer-container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px; }

        @media (max-width: 768px) {
            .modal-content { flex-direction: column; max-height: 95vh; }
            .modal-info-side { padding: 25px; }
            .work-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo"><a href="index.html">聯邦藝術中心</a></div>
        <ul class="menu">
            <li><a href="about.html">關於我們</a></li>
            <li><a href="artists.html">藝術家</a></li>
            <li><a href="artworks.html" class="active">作品總覽</a></li>
            <li><a href="visit.html">參觀資訊</a></li>
        </ul>
    </nav>
</header>

<section class="page-banner">
    <h1>典藏作品總覽</h1>
    <p>Masterpiece Collection</p>
</section>

<div class="sticky-filter">
    <div class="search-container">
        <input type="text" id="workSearch" class="search-bar" placeholder="搜尋作品或藝術家..." onkeyup="executeFilter()">
    </div>
    <div class="btn-group-scroll">
        <button class="filter-btn active" onclick="filterCategory(event, 'all')">全部 ALL</button>
        <button class="filter-btn" onclick="filterCategory(event, 'white')">白色系列</button>
        <button class="filter-btn" onclick="filterCategory(event, 'history')">歷史主題</button>
        <button class="filter-btn" onclick="filterCategory(event, 'landscape')">地景生活</button>
    </div>
</div>

<main>
    <div class="work-grid" id="workGrid">
        <div class="work-card" 
             data-category="white" 
             data-title="白色系列 NO.10" 
             data-artist="許坤成"
             onclick="openModal(this)"
             data-img="https://www.ubot.org.tw/blob/ArtCenter/%E8%A8%B1%E5%9D%A4%E6%88%90_%E7%99%BD%E8%89%B2%E7%B3%BB%E5%88%97NO.10.jpg"
             data-size="53X45cm(10F)"
             data-media="2024 油畫．麻布"
             data-concept="以「後立體派」的透視法來表現寫實靜物。讓畫面沒有照相機死板的透視效果，轉而呈現的是活潑的多視角平面繪畫。">
            
            <div class="work-img-container">
                <div class="work-img" style="background-image: url('https://www.ubot.org.tw/blob/ArtCenter/%E8%A8%B1%E5%9D%A4%E6%88%90_%E7%99%BD%E8%89%B2%E7%B3%BB%E5%88%97NO.10.jpg');"></div>
            </div>
            <div class="work-info">
                <span class="work-tag">WHITE SERIES</span>
                <div class="work-title">白色系列 NO.10</div>
                <div class="work-artist">許坤成 HSU KUN-CHENG</div>
            </div>
        </div>

        </div>
    <div id="noResult" style="text-align:center; padding:100px; display:none; color:#999;">查無相關作品</div>
</main>

<div class="modal-overlay" id="workModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-img-side">
            <img id="m-img" src="" alt="">
        </div>
        <div class="modal-info-side">
            <h2 id="m-title">作品名稱</h2>
            <div class="info-row">
                <span class="info-label">藝術家 Artist</span>
                <div class="info-value" id="m-artist"></div>
            </div>
            <div class="info-row">
                <span class="info-label">規格 Size</span>
                <div class="info-value" id="m-size"></div>
            </div>
            <div class="info-row">
                <span class="info-label">媒材 Media</span>
                <div class="info-value" id="m-media"></div>
            </div>
            <div class="info-concept">
                <span class="info-label">創作理念 Concept</span>
                <div id="m-concept"></div>
            </div>
        </div>
    </div>
</div>

<footer>
    <div class="footer-container">
        <div class="footer-info">
            <div class="footer-logo">UNION ART CENTER</div>
            <p>台北市大安區忠孝東路四段219號</p>
            <p>(02) 2536-9999</p>
        </div>
    </div>
    <div class="footer-bottom">© 2026 Union Art Center 版權所有</div>
</footer>

<script>
    let currentCat = 'all';

    // 1. 篩選與搜尋
    function filterCategory(e, cat) {
        currentCat = cat;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.currentTarget.classList.add('active');
        executeFilter();
    }

    function executeFilter() {
        const search = document.getElementById('workSearch').value.toLowerCase();
        const cards = document.querySelectorAll('.work-card');
        let count = 0;

        cards.forEach(card => {
            const title = card.dataset.title.toLowerCase();
            const artist = card.dataset.artist.toLowerCase();
            const cat = card.dataset.category;

            const matchSearch = title.includes(search) || artist.includes(search);
            const matchCat = (currentCat === 'all' || cat === currentCat);

            if (matchSearch && matchCat) {
                card.style.display = "block";
                count++;
            } else {
                card.style.display = "none";
            }
        });
        document.getElementById('noResult').style.display = (count === 0) ? "block" : "none";
    }

    // 2. 彈窗控制
    function openModal(el) {
        document.getElementById('m-title').innerText = el.dataset.title;
        document.getElementById('m-artist').innerText = el.dataset.artist;
        document.getElementById('m-size').innerText = el.dataset.size;
        document.getElementById('m-media').innerText = el.dataset.media;
        document.getElementById('m-concept').innerText = el.dataset.concept;
        document.getElementById('m-img').src = el.dataset.img;

        document.getElementById('workModal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('workModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    // 3. 處理網址傳來的藝術家參數 (來自 artists.html)
    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        const artist = params.get('artist');
        if (artist) {
            document.getElementById('workSearch').value = artist;
            executeFilter();
        }
    };

    // 點擊背景關閉
    window.onclick = (e) => { if(e.target.id === 'workModal') closeModal(); }
</script>

</body>
</html>
