<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>作品總覽｜聯邦藝術中心 Union Art Center</title>
    
    <style>
        :root {
            --ubot-red: #E60012;         /* 聯邦紅 */
            --ubot-blue: #003366;        /* 聯邦深藍 */
            --ubot-light-blue: #EAF6FC;  /* 聯邦淺藍背景 */
            --ubot-sky-blue: #00A1E9;    /* 聯邦淺藍點綴 */
            --text-dark: #333333;
            --text-gray: #666666;
            --border-color: #D1CDC4;
        }

        body {
            margin: 0;
            font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #f8fbfd;
            color: var(--text-dark);
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* ===== 1. Navbar ===== */
        header {
            background: #ffffff;
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 25px;
        }

        .logo a {
            font-size: 22px;
            font-weight: 800;
            color: var(--ubot-blue);
            text-decoration: none;
            display: flex;
            align-items: center;
            letter-spacing: 1px;
        }

        .logo a::before { 
            content: ""; width: 8px; height: 8px; background: var(--ubot-red); 
            border-radius: 50%; margin-right: 10px; 
        }

        .menu { display: flex; list-style: none; margin: 0; padding: 0; }
        .menu li { margin-left: 10px; }
        .menu a {
            text-decoration: none; color: #666; font-weight: 600;
            font-size: 15px; padding: 8px 12px; transition: 0.3s; display: block;
        }
        .menu a:hover, .menu a.active { color: var(--ubot-red); }

        .menu-toggle { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
        .menu-toggle span { width: 25px; height: 3px; background: var(--ubot-blue); transition: 0.3s; }

        /* ===== Banner ===== */
        .page-banner {
            width: 100%; height: 250px;
            background: linear-gradient(rgba(0,51,102,0.7), rgba(0,51,102,0.7)), 
                        url('https://images.unsplash.com/photo-1518998053574-53f026344594?auto=format&fit=crop&w=1200');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center;
        }
        .page-banner h1 { letter-spacing: 4px; margin: 0; font-size: 32px; }
        .page-banner p { opacity: 0.8; font-size: 14px; margin-top: 10px; letter-spacing: 2px; }

        /* ===== 篩選器 ===== */
        .sticky-filter {
            background: rgba(255,255,255,0.98); padding: 20px 0;
            position: sticky; top: 64px; z-index: 900;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); backdrop-filter: blur(10px);
        }
        .search-container { max-width: 1200px; margin: 0 auto; padding: 0 20px 15px; }
        .search-bar {
            width: 100%; padding: 14px 20px; border: 1.5px solid #eee;
            border-radius: 50px; font-size: 15px; box-sizing: border-box;
            background: #f5f7f9; transition: 0.3s; outline: none;
        }
        .search-bar:focus { border-color: var(--ubot-sky-blue); background: #fff; box-shadow: 0 0 10px rgba(0,161,233,0.1); }

        .btn-group-scroll {
            display: flex; overflow-x: auto; padding: 0 20px; gap: 10px;
            max-width: 1200px; margin: 0 auto; scrollbar-width: none; 
        }
        .btn-group-scroll::-webkit-scrollbar { display: none; }
        .filter-btn {
            white-space: nowrap; padding: 10px 24px; background: #fff;
            border: 1px solid #ddd; border-radius: 50px; cursor: pointer; transition: 0.3s;
            font-weight: 500; color: var(--text-gray);
        }
        .filter-btn.active { background: var(--ubot-blue); color: #fff; border-color: var(--ubot-blue); }

        /* ===== 作品網格 (核心修改：三張一排) ===== */
        .work-grid {
            display: grid;
            max-width: 1200px;
            margin: 0 auto;
            /* 強制設定為三列，間距調寬一點更有質感 */
            grid-template-columns: repeat(3, 1fr); 
            gap: 30px;
            padding: 40px 20px;
        }

        .work-card {
            background: #fff; border-radius: 16px; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); transition: all 0.4s ease; cursor: pointer;
            border: 1px solid #f0f0f0;
        }
        .work-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

        .work-img-container {
            width: 100%; aspect-ratio: 4 / 3; 
            overflow: hidden; background: #f9f9f9;
        }
        .work-img { 
            width: 100%; height: 100%; background-size: cover; background-position: center; 
            transition: 0.6s;
        }
        .work-card:hover .work-img { transform: scale(1.08); }

        .work-info { padding: 20px; }
        .work-tag { font-size: 12px; color: var(--ubot-red); font-weight: 800; letter-spacing: 1px; }
        .work-title { font-size: 18px; font-weight: 700; margin: 8px 0; color: var(--ubot-blue); }
        .work-artist { font-size: 14px; color: var(--text-gray); }

        /* ===== Modal ===== */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,15,30,0.9); display: none;
            justify-content: center; align-items: center; z-index: 2000; padding: 20px;
            backdrop-filter: blur(8px);
        }
        .modal-content {
            background: white; width: 100%; max-width: 1100px; max-height: 90vh;
            border-radius: 24px; overflow: hidden; display: flex; position: relative;
            animation: modalFade 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        @keyframes modalFade { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 35px; color: #999; cursor: pointer; z-index: 10; }
        .modal-img-side { flex: 1.4; background: #1a1a1a; display: flex; align-items: center; justify-content: center; }
        .modal-img-side img { width: 100%; height: 100%; object-fit: contain; }
        .modal-info-side { flex: 1; padding: 50px 40px; overflow-y: auto; }
        .modal-info-side h2 { color: var(--ubot-blue); margin-bottom: 25px; font-size: 28px; }
        .info-row { margin-bottom: 20px; }
        .info-label { font-weight: 800; color: #bbb; font-size: 12px; display: block; margin-bottom: 5px; }
        .info-value { color: #333; font-size: 17px; }
        .concept-text { color: #555; font-size: 16px; line-height: 1.8; margin-top: 15px; }

        /* ===== Footer ===== */
        footer { background: var(--ubot-light-blue); color: var(--ubot-blue); padding: 60px 20px 30px; margin-top: 80px; }
        .footer-container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px; }
        .footer-bottom { border-top: 1px solid rgba(0,51,102,0.1); text-align: center; padding-top: 20px; margin-top: 40px; font-size: 13px; opacity: 0.7; }

        /* ===== RWD ===== */
        @media (max-width: 992px) {
            .work-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; } /* 平板兩排 */
        }

        @media (max-width: 768px) {
            .menu-toggle { display: flex; }
            .menu {
                position: absolute; top: 100%; left: 0; right: 0;
                background: #fff; flex-direction: column; display: none;
                box-shadow: 0 10px 20px rgba(0,0,0,0.1); align-items: center;
            }
            .menu.active { display: flex; }
            .menu li { width: 100%; text-align: center; border-bottom: 1px solid #f9f9f9; }
            .menu a { padding: 15px; }
            .work-grid { grid-template-columns: 1fr; } /* 手機一排 */
            .modal-content { flex-direction: column; }
            .modal-img-side { height: 350px; }
        }
    </style>
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo"><a href="index.html">聯邦藝術中心</a></div>
        <div class="menu-toggle" id="mobile-menu">
            <span></span><span></span><span></span>
        </div>
        <ul class="menu" id="nav-list">
            <li><a href="about.html">關於我們</a></li>
            <li><a href="exhibitions.html">展覽動態</a></li>
            <li><a href="events.html">活動資訊</a></li>
            <li><a href="artists.html">藝術家</a></li>
            <li><a href="artworks.html" class="active">作品總覽</a></li>
            <li><a href="visit.html">參觀資訊</a></li>
            <li><a href="contact.html">聯絡我們</a></li>
        </ul>
    </nav>
</header>

<section class="page-banner">
    <h1>典藏作品總覽</h1>
    <p>MASTERPIECE COLLECTION</p>
</section>

<div class="sticky-filter">
    <div class="search-container">
        <input type="text" id="workSearch" class="search-bar" placeholder="搜尋作品名稱、藝術家..." onkeyup="executeFilter()">
    </div>
    <div class="btn-group-scroll">
        <button class="filter-btn active" onclick="filterCategory(event, 'all')">全部 ALL</button>
        <button class="filter-btn" onclick="filterCategory(event, 'white')">白色系列</button>
        <button class="filter-btn" onclick="filterCategory(event, 'history')">歷史主題</button>
        <button class="filter-btn" onclick="filterCategory(event, 'landscape')">地景生活</button>
        <button class="filter-btn" onclick="filterCategory(event, 'future')">未來意象</button>
    </div>
</div>

<main>
    <div class="work-grid" id="workGrid"></div>
    <div id="noResult" style="text-align:center; padding:100px; display:none; color:#999;">查無相關作品</div>
</main>

<div class="modal-overlay" id="workModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-img-side"><img id="m-img" src="" alt=""></div>
        <div class="modal-info-side">
            <h2 id="m-title"></h2>
            <div class="info-row"><span class="info-label">藝術家 Artist</span><div class="info-value" id="m-artist"></div></div>
            <div class="info-row"><span class="info-label">規格 Size</span><div class="info-value" id="m-size"></div></div>
            <div class="info-row"><span class="info-label">媒材 Media</span><div class="info-value" id="m-media"></div></div>
            <div class="concept-text" id="m-concept"></div>
        </div>
    </div>
</div>

<footer>
    <div class="footer-container">
        <div class="footer-info">
            <div class="footer-logo">UNION ART CENTER</div>
            <p>台北市大安區忠孝東路四段219號</p>
            <p>(02) 2536-9999</p>
        </div>
        <div class="footer-links">
            <h4>快速連結</h4>
            <ul>
                <li><a href="about.html">關於中心</a></li>
                <li><a href="artworks.html">典藏作品</a></li>
            </ul>
        </div>
    </div>
    <div class="footer-bottom">© 2026 Union Art Center 版權所有</div>
</footer>

<script>
    const mobileMenu = document.getElementById('mobile-menu');
    const navList = document.getElementById('nav-list');
    mobileMenu.onclick = () => navList.classList.toggle('active');

    const WORKS_DATA = [
        { artist: "許坤成", artistEn: "HSU KUN-CHENG", title: "白色系列 NO.10", category: "white", img: "https://www.ubot.org.tw/blob/ArtCenter/%E8%A8%B1%E5%9D%A4%E6%88%90_%E7%99%BD%E8%89%B2%E7%B3%BB%E5%88%97NO.10.jpg", size: "53X45cm(10F)", media: "2024 油畫．麻布", concept: "以「後立體派」的透視法來表現寫實靜物。讓畫面呈現活潑的多視角平面繪畫。" },
        { artist: "許坤成", artistEn: "HSU KUN-CHENG", title: "白色系列 NO.27", category: "white", img: "https://www.ubot.org.tw/blob/ArtCenter/%E8%A8%B1%E5%9D%A4%E6%88%90_%E7%99%BD%E8%89%B2%E7%B3%BB%E5%88%97NO.27.jpeg", size: "53X45cm(10F)", media: "2024 油畫．麻布", concept: "以「後立體派」的透視法來表現寫實靜物。" },
        { artist: "許坤成", artistEn: "HSU KUN-CHENG", title: "白色系列 NO.42", category: "white", img: "https://www.ubot.org.tw/blob/ArtCenter/%E8%A8%B1%E5%9D%A4%E6%88%90_%E7%99%BD%E8%89%B2%E7%B3%BB%E5%88%97NO.42.jpeg", size: "53X45cm(10F)", media: "2025 油畫．麻布", concept: "多視角平面繪畫。" },
        { artist: "許坤成", artistEn: "HSU KUN-CHENG", title: "白色系列 NO.43", category: "white", img: "https://www.ubot.org.tw/blob/ArtCenter/%E8%A8%B1%E5%9D%A4%E6%88%90_%E7%99%BD%E8%89%B2%E7%B3%BB%E5%88%97NO.43.jpeg", size: "53X45cm(10F)", media: "2025 油畫．麻布", concept: "靜物與空間的白色對話。" },
        { artist: "祁連", artistEn: "CHI LIEN", title: "能久親王進台北城", category: "history", img: "https://www.ubot.org.tw/blob/ArtCenter/%E7%A5%81%E9%80%A3_%E8%83%BD%E4%B9%85%E8%A6%AA%E7%8E%8B%E9%80%B2%E5%8F%B0%E5%8C%97%E5%9F%8E.jpg", size: "91X72.5cm(30F)", media: "2025 油畫．麻布", concept: "描繪了 1895 年日軍進入臺北城北門的樣貌。" },
        { artist: "祁連", artistEn: "CHI LIEN", title: "味方蕃與日軍偵搜小隊", category: "history", img: "https://www.ubot.org.tw/blob/ArtCenter/%E7%A5%81%E9%80%A3_%E5%91%B3%E6%96%B9%E8%95%83%E8%88%87%E6%97%A5%E8%BB%8D%E5%81%B5%E6%90%9C%E5%B0%8F%E9%9A%8A.jpg", size: "91X72.5cm(30F)", media: "2025 油畫．麻布", concept: "展示了日本軍隊與台灣原住民之間的互動。" },
        { artist: "蘇瑞明", artistEn: "SU RUI-MING", title: "雷亞托夜曲", category: "landscape", img: "https://www.ubot.org.tw/blob/ArtCenter/%E8%98%87%E7%91%9E%E6%98%8E_%E9%9B%B7%E4%BA%9E%E6%89%98%E5%A4%9C%E6%9B%B2.jpg", size: "91X72.5cm(30F)", media: "2025 油畫．麻布", concept: "璀璨的威尼斯日落。" },
        { artist: "蘇瑞明", artistEn: "SU RUI-MING", title: "湛藍帝國的甦醒", category: "landscape", img: "https://www.ubot.org.tw/blob/ArtCenter/%E8%98%87%E7%91%9E%E6%98%8E_%E6%B9%9B%E8%97%8D%E5%B8%9D%E5%9C%8B%E7%9A%84%E7%94%A6%E9%86%92.jpg", size: "91X72.5cm(30F)", media: "2025 油畫．麻布", concept: "亞德里亞海灣中輕晃的貢多拉。" }
    ];

    let currentCat = 'all';

    function renderWorks(data) {
        const grid = document.getElementById('workGrid');
        grid.innerHTML = data.map(work => `
            <div class="work-card" onclick="openModal('${work.title}')">
                <div class="work-img-container">
                    <div class="work-img" style="background-image: url('${work.img}');"></div>
                </div>
                <div class="work-info">
                    <span class="work-tag">${work.category.toUpperCase()} SERIES</span>
                    <div class="work-title">${work.title}</div>
                    <div class="work-artist">${work.artist}</div>
                </div>
            </div>
        `).join('');
    }

    function filterCategory(e, cat) {
        currentCat = cat;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.currentTarget.classList.add('active');
        executeFilter();
    }

    function executeFilter() {
        const search = document.getElementById('workSearch').value.toLowerCase();
        const filtered = WORKS_DATA.filter(work => {
            const matchSearch = work.title.toLowerCase().includes(search) || work.artist.toLowerCase().includes(search);
            const matchCat = (currentCat === 'all' || work.category === currentCat);
            return matchSearch && matchCat;
        });
        renderWorks(filtered);
        document.getElementById('noResult').style.display = (filtered.length === 0) ? "block" : "none";
    }

    function openModal(title) {
        const work = WORKS_DATA.find(w => w.title === title);
        if(!work) return;
        document.getElementById('m-title').innerText = work.title;
        document.getElementById('m-artist').innerText = `${work.artist} ${work.artistEn}`;
        document.getElementById('m-size').innerText = work.size;
        document.getElementById('m-media').innerText = work.media;
        document.getElementById('m-concept').innerText = work.concept;
        document.getElementById('m-img').src = work.img;
        document.getElementById('workModal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('workModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    window.onload = () => {
        renderWorks(WORKS_DATA);
        const params = new URLSearchParams(window.location.search);
        const artistName = params.get('artist');
        if (artistName) {
            document.getElementById('workSearch').value = artistName;
            executeFilter();
        }
    };
    window.onclick = (e) => { if(e.target.id === 'workModal') closeModal(); }
</script>

</body>
</html>
