<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作品總覽｜聯邦藝術中心 Union Art Center</title>

<style>
:root{
--ubot-red:#E60012;
--ubot-blue:#003366;
--ubot-light-blue:#EAF6FC;
--ubot-sky-blue:#00A1E9;
--text-main:#222;
--text-sub:#666;
--border-color:#D1CDC4;
--transition:all .4s cubic-bezier(.23,1,.32,1);
}

body{
margin:0;
font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
background:#f8fbfd;
color:var(--text-main);
line-height:1.8;
overflow-x:hidden;
}

/* ===== Header ===== */

header{
background:#fff;
position:sticky;
top:0;
z-index:1000;
transition:.3s;
}

header.shrink{
box-shadow:0 8px 25px rgba(0,0,0,.08);
}

.navbar{
max-width:1200px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 25px;
}

.logo a{
font-size:22px;
font-weight:800;
color:var(--ubot-blue);
text-decoration:none;
display:flex;
align-items:center;
}

.logo a::before{
content:"";
width:8px;
height:8px;
background:var(--ubot-red);
border-radius:50%;
margin-right:10px;
}

.menu{
display:flex;
list-style:none;
margin:0;
padding:0;
}

.menu li{margin-left:15px;}

.menu a{
text-decoration:none;
color:#666;
font-size:14px;
font-weight:600;
}

.menu a.active,
.menu a:hover{color:var(--ubot-red);}

/* 手機選單 */

.menu-toggle{
display:none;
font-size:26px;
cursor:pointer;
color:var(--ubot-blue);
}

.mobile-menu{
position:fixed;
top:0;
right:-260px;
width:260px;
height:100%;
background:#fff;
box-shadow:-5px 0 30px rgba(0,0,0,.15);
transition:.4s;
padding-top:80px;
z-index:2000;
}

.mobile-menu ul{list-style:none;padding:0;}

.mobile-menu li{border-bottom:1px solid #eee;}

.mobile-menu a{
display:block;
padding:15px 20px;
text-decoration:none;
color:var(--ubot-blue);
font-weight:600;
}

.mobile-menu.show{right:0;}

.overlay-menu{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,.4);
top:0;
left:0;
opacity:0;
visibility:hidden;
transition:.3s;
z-index:1500;
}

.overlay-menu.show{
opacity:1;
visibility:visible;
}

/* ===== Banner ===== */

.page-banner{
height:320px;
background:linear-gradient(rgba(0,51,102,.65),rgba(0,51,102,.65)),
url('https://images.unsplash.com/photo-1518998053574-53f026344594?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:#fff;
text-align:center;
}

.page-banner h1{
font-size:36px;
letter-spacing:6px;
margin:0;
}

.page-banner p{
margin-top:10px;
letter-spacing:3px;
font-size:14px;
opacity:.9;
}

/* ===== Filter ===== */

.sticky-filter{
max-width:1100px;
margin:-40px auto 60px;
background:#fff;
padding:25px 35px;
box-shadow:0 15px 40px rgba(0,0,0,.06);
position:sticky;
top:85px;
z-index:900;
border-radius:6px;
}

.filter-container{
display:flex;
flex-wrap:wrap;
justify-content:space-between;
align-items:center;
gap:20px;
}

.search-bar{
width:100%;
padding:12px 20px;
border-radius:30px;
border:1px solid #ddd;
outline:none;
}

.btn-group{
display:flex;
gap:10px;
overflow-x:auto;
}

.btn-group::-webkit-scrollbar{display:none;}

.filter-btn{
flex:0 0 auto;
padding:8px 18px;
border-radius:30px;
border:1px solid #ddd;
background:#fff;
font-size:13px;
font-weight:600;
cursor:pointer;
}

.filter-btn.active{
background:var(--ubot-blue);
color:#fff;
border-color:var(--ubot-blue);
}

/* ===== Grid ===== */

.work-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:35px;
max-width:1200px;
margin:auto;
padding:0 25px 100px;
}

.work-card{
background:#fff;
text-decoration:none;
color:inherit;
display:flex;
flex-direction:column;
overflow:hidden;
border-radius:10px;
border:1px solid rgba(0,0,0,.05);
transition:.4s;
opacity:0;
transform:translateY(40px);
animation:fadeUp .8s forwards;
}

@keyframes fadeUp{
to{opacity:1;transform:translateY(0);}
}

.work-card:hover{
transform:translateY(-10px);
box-shadow:0 20px 40px rgba(0,51,102,.12);
}

.work-img-container{
aspect-ratio:1/1;
overflow:hidden;
position:relative;
}

.work-img{
width:100%;
height:100%;
background-size:cover;
background-position:center;
transition:1.2s;
}

.work-card:hover .work-img{transform:scale(1.1);}

.overlay{
position:absolute;
inset:0;
background:rgba(0,51,102,.7);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
transition:.4s;
}

.overlay span{
color:#fff;
border:1px solid #fff;
padding:10px 20px;
font-size:12px;
letter-spacing:2px;
}

.work-card:hover .overlay{opacity:1;}

.work-info{
padding:25px;
text-align:center;
}

.work-tag{
font-size:11px;
color:var(--ubot-red);
letter-spacing:2px;
display:block;
margin-bottom:10px;
font-weight:700;
}

.work-title{
font-size:1.1rem;
font-weight:700;
color:var(--ubot-blue);
margin-bottom:6px;
}

.work-artist{
font-size:13px;
color:var(--text-sub);
}

/* ===== 手機優化 ===== */

@media(max-width:768px){

.menu{display:none;}
.menu-toggle{display:block;}

.page-banner{height:220px;}
.page-banner h1{font-size:24px;}

.sticky-filter{
margin:0 15px 30px;
top:70px;
padding:20px;
}

.work-grid{
grid-template-columns:repeat(2,1fr);
gap:18px;
padding:0 15px 80px;
}

}
</style>
</head>

<body>

<header id="header">
<nav class="navbar">
<div class="logo"><a href="index.html">聯邦藝術中心</a></div>
<div class="menu-toggle" onclick="openMenu()">☰</div>
<ul class="menu">
<li><a href="about.html">關於我們</a></li>
<li><a href="exhibitions.html">展覽動態</a></li>
<li><a href="awards.html">美術獎項</a></li>
<li><a href="artists.html">藝術家</a></li>
<li><a href="artworks.html" class="active">作品總覽</a></li>
<li><a href="visit.html">參觀資訊</a></li>
</ul>
</nav>
</header>

<div class="mobile-menu" id="mobileMenu">
<ul>
<li><a href="about.html">關於我們</a></li>
<li><a href="exhibitions.html">展覽動態</a></li>
<li><a href="artists.html">藝術家</a></li>
<li><a href="artworks.html">作品總覽</a></li>
</ul>
</div>

<div class="overlay-menu" id="overlayMenu" onclick="closeMenu()"></div>

<!-- 其餘內容（你的作品卡片區塊）保持不變 -->

<script>
function openMenu(){
document.getElementById("mobileMenu").classList.add("show");
document.getElementById("overlayMenu").classList.add("show");
}
function closeMenu(){
document.getElementById("mobileMenu").classList.remove("show");
document.getElementById("overlayMenu").classList.remove("show");
}
window.addEventListener("scroll",function(){
let header=document.getElementById("header");
if(window.scrollY>50){header.classList.add("shrink");}
else{header.classList.remove("shrink");}
});
</script>

</body>
</html>
