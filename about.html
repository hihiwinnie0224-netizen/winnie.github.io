<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>關於我們｜聯邦藝術中心 Union Art Center</title>

<style>
:root {
    --ubot-red: #E60012;
    --ubot-blue: #003366;
    --ubot-light-blue: #EAF6FC;
    --text-main: #222;
    --border-color: #D1CDC4;
}

body {
    margin: 0;
    font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: #f8fbfd;
    color: var(--text-main);
    line-height: 1.8;
}

/* ===== Header ===== */

header {
    background: #fff;
    position: sticky;
    top: 0;
    z-index: 1000;
    transition: 0.3s;
}

header.shrink {
    padding: 5px 0;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

.navbar {
    max-width: 1200px;
    margin: auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
}

.logo a {
    font-size: 22px;
    font-weight: 800;
    text-decoration: none;
    color: var(--ubot-blue);
}

.menu {
    display: flex;
    list-style: none;
    margin: 0;
    padding: 0;
}

.menu li { margin-left: 20px; }

.menu a {
    text-decoration: none;
    color: #666;
    font-weight: 600;
    font-size: 14px;
}

.menu a.active,
.menu a:hover { color: var(--ubot-red); }

/* ===== 手機選單 ===== */

.menu-toggle {
    display: none;
    font-size: 28px;
    cursor: pointer;
    color: var(--ubot-blue);
}

.mobile-menu {
    position: fixed;
    top: 0;
    right: -260px;
    width: 260px;
    height: 100%;
    background: #fff;
    box-shadow: -5px 0 30px rgba(0,0,0,0.1);
    transition: 0.4s;
    padding-top: 80px;
    z-index: 2000;
}

.mobile-menu ul {
    list-style: none;
    padding: 0;
}

.mobile-menu li {
    border-bottom: 1px solid #eee;
}

.mobile-menu a {
    display: block;
    padding: 15px 20px;
    text-decoration: none;
    color: var(--ubot-blue);
    font-weight: 600;
}

.mobile-menu a:hover {
    background: var(--ubot-light-blue);
}

.mobile-menu.show {
    right: 0;
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    top: 0;
    left: 0;
    opacity: 0;
    visibility: hidden;
    transition: 0.3s;
    z-index: 1500;
}

.overlay.show {
    opacity: 1;
    visibility: visible;
}

/* ===== Banner ===== */

.page-banner {
    height: 300px;
    background: linear-gradient(rgba(0,51,102,0.6), rgba(0,51,102,0.6)),
    url('https://images.unsplash.com/photo-1499781350541-7783f6c6a0c8?auto=format&fit=crop&w=1600&q=80');
    background-size: cover;
    background-position: center;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: #fff;
}

.page-banner h1 {
    font-size: 38px;
    letter-spacing: 5px;
}

/* ===== Content ===== */

.about-container {
    max-width: 1000px;
    margin: -60px auto 100px;
    padding: 0 20px;
}

.about-section {
    background: #fff;
    padding: 40px;
    margin-bottom: 30px;
    border: 1px solid var(--border-color);
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

.about-section h2 {
    color: var(--ubot-blue);
    margin-bottom: 20px;
}

.milestone-grid {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 20px;
}

.milestone-item {
    padding: 20px;
    background: #fafafa;
    border: 1px solid #eee;
}

.milestone-year {
    color: var(--ubot-red);
    font-weight: 800;
}

.space-grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 15px;
    margin-top: 20px;
}

.space-item {
    padding: 25px;
    text-align: center;
    border: 1px solid #eee;
    font-weight: 700;
}

/* ===== Footer ===== */

footer {
    background: var(--ubot-light-blue);
    padding: 60px 20px;
    text-align: center;
    color: var(--ubot-blue);
}

/* ===== RWD ===== */

@media(max-width:768px){

.menu { display: none; }

.menu-toggle { display: block; }

.page-banner { height: 200px; }

.page-banner h1 { font-size: 26px; }

.milestone-grid,
.space-grid { grid-template-columns: 1fr; }

.about-section { padding: 25px; }

}
</style>
</head>

<body>

<header id="header">
    <nav class="navbar">
        <div class="logo">
            <a href="index.html">聯邦藝術中心</a>
        </div>
        <div class="menu-toggle" onclick="openMenu()">☰</div>
        <ul class="menu">
            <li><a href="about.html" class="active">關於我們</a></li>
            <li><a href="exhibitions.html">展覽動態</a></li>
            <li><a href="awards.html">美術獎項</a></li>
            <li><a href="artists.html">藝術家</a></li>
            <li><a href="visit.html">參觀資訊</a></li>
            <li><a href="contact.html">聯絡我們</a></li>
        </ul>
    </nav>
</header>

<!-- 手機滑入選單 -->
<div class="mobile-menu" id="mobileMenu">
<ul>
<li><a href="about.html">關於我們</a></li>
<li><a href="exhibitions.html">展覽動態</a></li>
<li><a href="awards.html">美術獎項</a></li>
<li><a href="artists.html">藝術家</a></li>
<li><a href="visit.html">參觀資訊</a></li>
<li><a href="contact.html">聯絡我們</a></li>
</ul>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<section class="page-banner">
    <h1>關於我們</h1>
</section>

<div class="about-container">

<div class="about-section">
<h2>中心簡介</h2>
<p>聯邦藝術中心致力於發掘台灣本土優秀藝術人才，提供專業展覽與典藏空間。</p>
</div>

<div class="about-section">
<h2>發展里程碑</h2>
<div class="milestone-grid">
<div class="milestone-item"><span class="milestone-year">1998</span><br>基金會成立</div>
<div class="milestone-item"><span class="milestone-year">1999</span><br>首屆美術新人獎</div>
<div class="milestone-item"><span class="milestone-year">2003</span><br>印象大獎成立</div>
<div class="milestone-item"><span class="milestone-year">2026</span><br>大安新址啟用</div>
</div>
</div>

<div class="about-section">
<h2>空間設施</h2>
<div class="space-grid">
<div class="space-item">典藏展覽室</div>
<div class="space-item">多功能講座廳</div>
<div class="space-item">數位典藏室</div>
</div>
</div>

</div>

<footer>
© 2026 Union Art Center 聯邦藝術中心
</footer>

<script>
function openMenu(){
document.getElementById("mobileMenu").classList.add("show");
document.getElementById("overlay").classList.add("show");
}

function closeMenu(){
document.getElementById("mobileMenu").classList.remove("show");
document.getElementById("overlay").classList.remove("show");
}

window.addEventListener("scroll", function(){
let header = document.getElementById("header");
if(window.scrollY > 50){
header.classList.add("shrink");
}else{
header.classList.remove("shrink");
}
});
</script>

</body>
</html>
