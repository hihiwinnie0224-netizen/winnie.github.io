<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>許坤成 教授 - 藝術家典藏｜聯邦藝術中心</title>

<style>
:root {
    --ubot-blue:#003366;
    --ubot-red:#E60012;
    --ubot-gold:#B89130;
    --light-bg:#FDFDFB;
    --text-main:#2A2A2A;
}

body{
    margin:0;
    font-family:"Noto Serif TC","PingFang TC",serif;
    background:var(--light-bg);
    color:var(--text-main);
    line-height:1.8;
}

/* ===== Header ===== */

header{
    background:#fff;
    position:sticky;
    top:0;
    z-index:1000;
    transition:.3s;
}

header.shrink{
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.navbar{
    max-width:1200px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 25px;
}

.logo a{
    text-decoration:none;
    font-weight:800;
    font-size:20px;
    color:var(--ubot-blue);
}

.menu{
    list-style:none;
    display:flex;
    margin:0;
    padding:0;
}

.menu li{margin-left:20px;}

.menu a{
    text-decoration:none;
    color:#555;
    font-weight:600;
    font-size:14px;
}

.menu a:hover,
.menu a.active{color:var(--ubot-red);}

/* ===== 手機選單 ===== */

.menu-toggle{
    display:none;
    font-size:26px;
    cursor:pointer;
    color:var(--ubot-blue);
}

.mobile-menu{
    position:fixed;
    top:0;
    right:-260px;
    width:260px;
    height:100%;
    background:#fff;
    box-shadow:-5px 0 30px rgba(0,0,0,.1);
    transition:.4s;
    padding-top:80px;
    z-index:2000;
}

.mobile-menu ul{list-style:none;padding:0;}

.mobile-menu li{border-bottom:1px solid #eee;}

.mobile-menu a{
    display:block;
    padding:15px 20px;
    text-decoration:none;
    color:var(--ubot-blue);
    font-weight:600;
}

.mobile-menu.show{right:0;}

.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.4);
    top:0;
    left:0;
    opacity:0;
    visibility:hidden;
    transition:.3s;
    z-index:1500;
}

.overlay.show{
    opacity:1;
    visibility:visible;
}

/* ===== Back Nav ===== */

.back-nav{
    background:#f5f5f5;
    padding:12px 20px;
    font-size:13px;
}

/* ===== Layout ===== */

.detail-container{
    max-width:1100px;
    margin:60px auto;
    padding:0 20px;
    display:grid;
    grid-template-columns:320px 1fr;
    gap:60px;
}

/* Sidebar */

.profile-sidebar{
    position:sticky;
    top:120px;
}

.photo-wrapper{
    background:#fff;
    padding:10px;
    border:1px solid #ddd;
    box-shadow:0 15px 30px rgba(0,0,0,.05);
}

.main-photo{
    width:100%;
    aspect-ratio:1/1.3;
    background:url('https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png');
    background-size:cover;
    background-position:center;
}

.role-badge{
    background:var(--ubot-blue);
    color:#fff;
    display:inline-block;
    padding:4px 12px;
    font-size:12px;
    margin-top:15px;
}

.quick-fact{
    margin-top:15px;
    font-size:14px;
    border-left:2px solid var(--ubot-gold);
    padding-left:12px;
    color:#777;
}

/* Bio */

.bio-content h1{
    font-size:2.5rem;
    letter-spacing:8px;
    color:var(--ubot-blue);
}

.english-name{
    letter-spacing:4px;
    color:var(--ubot-gold);
    font-size:.9rem;
    margin-bottom:40px;
}

.bio-section{margin-bottom:40px;}

.bio-section h3{
    border-bottom:1px solid #eee;
    padding-bottom:10px;
    color:var(--ubot-blue);
}

.bio-list{
    list-style:none;
    padding:0;
}

.bio-list li{
    margin-bottom:10px;
    padding-left:18px;
    position:relative;
}

.bio-list li::before{
    content:"▪";
    position:absolute;
    left:0;
    color:var(--ubot-gold);
}

/* Artwork */

.artwork-section{
    grid-column:1/span 2;
    margin-top:50px;
    border-top:1px solid #eee;
    padding-top:50px;
}

.section-title{
    text-align:center;
    margin-bottom:40px;
}

.artwork-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.artwork-card{
    text-decoration:none;
    background:#fff;
    padding:10px;
    border:1px solid #eee;
    transition:.3s;
}

.artwork-card:hover{
    transform:translateY(-6px);
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.work-img{
    aspect-ratio:1/1;
    overflow:hidden;
    margin-bottom:10px;
}

.work-img img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.work-title{
    text-align:center;
    font-weight:bold;
    font-size:14px;
    color:var(--ubot-blue);
}

.work-year{
    text-align:center;
    font-size:12px;
    color:#999;
}

/* Footer */

footer{
    background:#1a1a1a;
    color:#aaa;
    padding:40px 20px;
    text-align:center;
    font-size:13px;
}

/* ===== RWD ===== */

@media(max-width:850px){

.menu{display:none;}
.menu-toggle{display:block;}

.detail-container{
grid-template-columns:1fr;
gap:40px;
margin:40px auto;
}

.profile-sidebar{
position:static;
max-width:280px;
margin:0 auto;
}

.artwork-section{
grid-column:1;
}

.bio-content h1{
font-size:1.8rem;
letter-spacing:4px;
}

}
</style>
</head>

<body>

<header id="header">
<nav class="navbar">
<div class="logo"><a href="index.html">聯邦藝術中心</a></div>
<div class="menu-toggle" onclick="openMenu()">☰</div>
<ul class="menu">
<li><a href="#">關於我們</a></li>
<li><a href="#">美術獎項</a></li>
<li><a href="#" class="active">藝術家</a></li>
<li><a href="#">參觀資訊</a></li>
</ul>
</nav>
</header>

<div class="mobile-menu" id="mobileMenu">
<ul>
<li><a href="#">關於我們</a></li>
<li><a href="#">美術獎項</a></li>
<li><a href="#">藝術家</a></li>
<li><a href="#">參觀資訊</a></li>
</ul>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<nav class="back-nav">
<a href="artists.html">← 返回藝術家列表</a>
</nav>

<!-- 下面內容保持原本結構即可 -->
<!-- (你的 main 內容可直接接在這裡，不需改動) -->

<script>
function openMenu(){
document.getElementById("mobileMenu").classList.add("show");
document.getElementById("overlay").classList.add("show");
}

function closeMenu(){
document.getElementById("mobileMenu").classList.remove("show");
document.getElementById("overlay").classList.remove("show");
}

window.addEventListener("scroll",function(){
let header=document.getElementById("header");
if(window.scrollY>50){
header.classList.add("shrink");
}else{
header.classList.remove("shrink");
}
});
</script>

</body>
</html>
