<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
    :root {
        --ubot-blue: #003366;     /* 聯邦深藍 */
        --ubot-red: #E60012;      /* 聯邦紅 */
        --ubot-gold: #B89130;     /* 典藏金 */
        --bg-gray: #F8F9FA;
        --border-color: #E0E0E0;
        --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    
    body { 
        font-family: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif; 
        margin: 0; padding: 60px 20px; 
        background-color: var(--bg-gray); 
        color: #333;
    }

    /* 1. 聯邦風格搜尋列：方正中帶圓潤，強調輸入的穩定感 */
    .search-section {
        max-width: 800px;
        margin: 0 auto 80px;
        text-align: center;
    }

    .search-label {
        color: var(--ubot-blue);
        font-weight: 700;
        letter-spacing: 4px;
        margin-bottom: 20px;
        font-size: 1.1rem;
    }

    #artistSearch {
        width: 100%;
        max-width: 500px;
        padding: 18px 35px;
        font-size: 16px;
        border: 2px solid var(--ubot-blue); /* 使用深藍邊框增加重量感 */
        background: #fff;
        outline: none;
        transition: var(--ease);
        letter-spacing: 1px;
        /* 銀行風格偏好穩定的方圓 */
        border-radius: 4px; 
    }

    #artistSearch:focus {
        border-color: var(--ubot-red);
        box-shadow: 0 5px 15px rgba(230, 0, 18, 0.1);
    }

    /* 2. 佈局結構 */
    .artist-wrapper { max-width: 1200px; margin: 0 auto; }

    /* 召集人專區：增加尊榮感背景 */
    .leader-row {
        display: flex;
        justify-content: center;
        margin-bottom: 80px;
        padding: 40px;
        background: white;
        border: 1px solid var(--border-color);
        border-top: 4px solid var(--ubot-gold); /* 金色頂條標示權威 */
    }

    /* 藝術家網格：維持六個一排的秩序感 */
    .artist-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 25px;
    }

    /* 藝術家卡片：優化為「收藏牌」樣式 */
    .artist-card {
        text-decoration: none;
        color: inherit;
        text-align: center;
        transition: var(--ease);
        display: block;
        padding: 25px 15px;
        background: white;
        border: 1px solid transparent;
    }
    .artist-card:hover { 
        background: white;
        border-color: var(--ubot-blue);
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0, 51, 102, 0.08);
    }

    /* 頭像外框：由圓轉方，增加莊重感 */
    .photo-frame {
        width: 110px;
        height: 110px;
        margin: 0 auto 15px;
        overflow: hidden;
        border: 1px solid var(--border-color);
        background-color: #eee;
        border-radius: 4px; /* 銀行業更偏好穩重的方形/微圓角 */
    }
    .photo-frame img {
        width: 100%; height: 100%;
        object-fit: cover;
        transition: 0.6s var(--ease);
    }
    .artist-card:hover .photo-frame img { transform: scale(1.08); }

    /* 召集人樣式強化 */
    .leader-card { width: 300px; padding: 20px; }
    .leader-card .photo-frame { width: 150px; height: 150px; border-color: var(--ubot-gold); }
    .leader-card .artist-name { font-size: 1.5rem; color: var(--ubot-blue); margin-top: 15px; }
    .leader-card .artist-award { color: var(--ubot-gold); font-weight: 700; font-size: 13px; }

    /* 文字樣式 */
    .artist-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; color: #1A1A1A; }
    .artist-award { font-size: 12px; color: var(--ubot-red); font-weight: 500; }

    #noResult { display: none; text-align: center; color: #999; padding: 100px 0; font-size: 1.2rem; }

    /* RWD */
    @media (max-width: 1100px) { .artist-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 768px) { .artist-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 480px) { .artist-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

    <div class="search-section">
        <div class="search-label">ARTIST REPOSITORY / 藝術家典藏檢索</div>
        <input type="text" id="artistSearch" placeholder="輸入藝術家姓名..." onkeyup="filterArtists()">
    </div>

    <div class="artist-wrapper" id="artistList">
        
        <div class="leader-row">
            <a href="#" class="artist-card leader-card" data-name="許坤成">
                <div class="photo-frame">
                    <img src="https://api.dicebear.com/8.x/notionists-neutral/svg?seed=hsu" alt="許坤成">
                </div>
                <div class="artist-name">許坤成</div>
                <div class="artist-award">評審委員會召集人</div>
            </a>
        </div>

        <div class="artist-grid">
            <a href="#" class="artist-card" data-name="祁連">
                <div class="photo-frame"><img src="https://api.dicebear.com/8.x/avataaars/svg?seed=1"></div>
                <div class="artist-name">祁連</div>
                <div class="artist-award">聯邦美術獎得主</div>
            </a>
            <a href="#" class="artist-card" data-name="蘇瑞明">
                <div class="photo-frame"><img src="https://api.dicebear.com/8.x/avataaars/svg?seed=2"></div>
                <div class="artist-name">蘇瑞明</div>
                <div class="artist-award">聯邦美術獎得主</div>
            </a>
            <a href="#" class="artist-card" data-name="高慶元">
                <div class="photo-frame"><img src="https://api.dicebear.com/8.x/avataaars/svg?seed=3"></div>
                <div class="artist-name">高慶元</div>
                <div class="artist-award">聯邦美術獎得主</div>
            </a>
            <a href="#" class="artist-card" data-name="林仁山">
                <div class="photo-frame"><img src="https://api.dicebear.com/8.x/avataaars/svg?seed=4"></div>
                <div class="artist-name">林仁山</div>
                <div class="artist-award">聯邦美術獎得主</div>
            </a>
            <a href="#" class="artist-card" data-name="劉國正">
                <div class="photo-frame"><img src="https://api.dicebear.com/8.x/avataaars/svg?seed=5"></div>
                <div class="artist-name">劉國正</div>
                <div class="artist-award">聯邦美術獎得主</div>
            </a>
            <a href="#" class="artist-card" data-name="翁明哲">
                <div class="photo-frame"><img src="https://api.dicebear.com/8.x/avataaars/svg?seed=6"></div>
                <div class="artist-name">翁明哲</div>
                <div class="artist-award">聯邦美術獎得主</div>
            </a>
            </div>
    </div>

    <div id="noResult">抱歉，找不到符合條件的藝術家資料。</div>

    <script>
        function filterArtists() {
            var input = document.getElementById('artistSearch');
            var filter = input.value.toLowerCase();
            var cards = document.getElementsByClassName('artist-card');
            var noResult = document.getElementById('noResult');
            var count = 0;

            for (var i = 0; i < cards.length; i++) {
                var name = cards[i].getAttribute('data-name');
                if (name.toLowerCase().indexOf(filter) > -1) {
                    cards[i].style.display = "";
                    count++;
                } else {
                    cards[i].style.display = "none";
                }
            }

            // 處理標題線條與顯示
            var leaderRow = document.querySelector('.leader-row');
            var leaderVisible = (document.querySelector('.leader-card').style.display !== "none");
            
            leaderRow.style.display = (count > 0 && leaderVisible) ? "flex" : "none";
            noResult.style.display = (count === 0) ? "block" : "none";
        }
    </script>

</body>
</html>
