<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>藝術家典藏｜聯邦藝術中心</title>

<style>
:root{
--ubot-red:#E60012;
--ubot-blue:#003366;
--ubot-light-blue:#EAF6FC;
--ubot-sky-blue:#00A1E9;
--primary-gold:#a68d5e;
--border-color:#D1CDC4;
--bg-warm:#f8fbfd;
}

body{
margin:0;
font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
background:var(--bg-warm);
color:#222;
line-height:1.7;
}

/* ===== Header ===== */

header{
background:#fff;
position:sticky;
top:0;
z-index:1000;
transition:.3s;
}

header.shrink{
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.navbar{
max-width:1200px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 20px;
}

.logo a{
font-size:20px;
font-weight:800;
color:var(--ubot-blue);
text-decoration:none;
}

.menu{
display:flex;
list-style:none;
margin:0;
padding:0;
}

.menu li{margin-left:15px;}

.menu a{
text-decoration:none;
font-size:14px;
font-weight:600;
color:#555;
}

.menu a.active,
.menu a:hover{color:var(--ubot-red);}

/* 手機選單 */

.menu-toggle{
display:none;
font-size:26px;
cursor:pointer;
color:var(--ubot-blue);
}

.mobile-menu{
position:fixed;
top:0;
right:-260px;
width:260px;
height:100%;
background:#fff;
box-shadow:-5px 0 30px rgba(0,0,0,.15);
transition:.4s;
padding-top:80px;
z-index:2000;
}

.mobile-menu ul{list-style:none;padding:0;}

.mobile-menu li{border-bottom:1px solid #eee;}

.mobile-menu a{
display:block;
padding:15px 20px;
text-decoration:none;
color:var(--ubot-blue);
font-weight:600;
}

.mobile-menu.show{right:0;}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,.4);
top:0;
left:0;
opacity:0;
visibility:hidden;
transition:.3s;
z-index:1500;
}

.overlay.show{
opacity:1;
visibility:visible;
}

/* ===== Banner ===== */

.page-banner{
height:260px;
background:linear-gradient(rgba(0,51,102,.6),rgba(0,51,102,.6)),
url('https://images.unsplash.com/photo-1460666819451-7410f5238d41?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
color:#fff;
text-align:center;
}

.page-banner h1{
margin:0;
font-size:32px;
letter-spacing:4px;
}

.page-banner p{
margin-top:8px;
font-size:14px;
opacity:.9;
}

/* ===== 搜尋區 ===== */

.sticky-tools{
position:sticky;
top:70px;
background:rgba(248,251,253,.95);
backdrop-filter:blur(8px);
padding:20px 0;
border-bottom:1px solid #eee;
z-index:900;
}

.filter-container{
max-width:1200px;
margin:auto;
padding:0 20px;
}

.search-box{
width:100%;
padding:12px 20px;
border-radius:40px;
border:1px solid var(--border-color);
font-size:15px;
outline:none;
}

/* 分類按鈕可橫向滑動 */

.tab-switcher{
display:flex;
gap:10px;
overflow-x:auto;
padding-bottom:5px;
}

.tab-switcher::-webkit-scrollbar{display:none;}

.btn-tab{
flex:0 0 auto;
padding:8px 18px;
border-radius:40px;
border:1.5px solid var(--ubot-blue);
background:#fff;
font-weight:600;
cursor:pointer;
}

.btn-tab.active{
background:var(--ubot-blue);
color:#fff;
}

/* ===== 內容 ===== */

.main-content{
max-width:1200px;
margin:40px auto 100px;
padding:0 20px;
}

.year-row{
background:#fff;
border-radius:10px;
padding:25px;
margin-bottom:30px;
box-shadow:0 8px 25px rgba(0,0,0,.05);
}

.year-label{
font-weight:800;
color:var(--ubot-blue);
margin-bottom:20px;
border-left:5px solid var(--ubot-red);
padding-left:12px;
}

.winners-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:20px;
}

.winner-card{
text-align:center;
padding:18px;
border-radius:12px;
border:1px solid #eee;
background:#fff;
transition:.3s;
cursor:pointer;
}

.winner-card:hover{
transform:translateY(-6px);
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.avatar{
width:70px;
height:70px;
border-radius:50%;
margin:0 auto 10px;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
font-weight:bold;
font-size:22px;
}

.name{
font-weight:700;
margin-bottom:6px;
}

.tag{
font-size:11px;
padding:2px 10px;
border-radius:20px;
margin-bottom:8px;
display:inline-block;
}

.tag-首獎{background:#fff3cd;color:#856404;}
.tag-優選{background:#d1ecf1;color:#0c5460;}
.tag-入選{background:#e2e3e5;color:#383d41;}
.tag-大師{background:var(--ubot-blue);color:#fff;}

/* ===== Footer ===== */

footer{
background:var(--ubot-light-blue);
padding:50px 20px;
text-align:center;
font-size:14px;
}

/* ===== 手機優化 ===== */

@media(max-width:768px){

.menu{display:none;}
.menu-toggle{display:block;}

.winners-grid{
grid-template-columns:repeat(2,1fr);
}

.page-banner{
height:200px;
}

.page-banner h1{
font-size:24px;
}

}
</style>
</head>

<body>

<header id="header">
<nav class="navbar">
<div class="logo"><a href="index.html">聯邦藝術中心</a></div>
<div class="menu-toggle" onclick="openMenu()">☰</div>
<ul class="menu">
<li><a href="about.html">關於我們</a></li>
<li><a href="artists.html" class="active">藝術家</a></li>
<li><a href="visit.html">參觀資訊</a></li>
</ul>
</nav>
</header>

<div class="mobile-menu" id="mobileMenu">
<ul>
<li><a href="about.html">關於我們</a></li>
<li><a href="artists.html">藝術家</a></li>
<li><a href="visit.html">參觀資訊</a></li>
</ul>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<section class="page-banner">
<h1>藝術家典藏</h1>
<p>Collection of Distinguished Artists</p>
</section>

<div class="sticky-tools">
<div class="filter-container">
<input type="text" id="artistSearch" class="search-box" placeholder="搜尋姓名或獎項..." onkeyup="handleSearch()">
<br><br>
<div class="tab-switcher">
<button class="btn-tab active" onclick="switchCategory('master')">歷屆大師</button>
<button class="btn-tab" onclick="switchCategory('newbie')">新人獎</button>
<button class="btn-tab" onclick="switchCategory('impression')">印象大獎</button>
</div>
</div>
</div>

<main class="main-content">
<div id="contentList"></div>
</main>

<footer>
© 2026 Union Art Center 聯邦藝術中心
</footer>

<script>
function openMenu(){
document.getElementById("mobileMenu").classList.add("show");
document.getElementById("overlay").classList.add("show");
}
function closeMenu(){
document.getElementById("mobileMenu").classList.remove("show");
document.getElementById("overlay").classList.remove("show");
}
window.addEventListener("scroll",function(){
let header=document.getElementById("header");
if(window.scrollY>50){header.classList.add("shrink");}
else{header.classList.remove("shrink");}
});

/* ===== 原本資料邏輯保持 ===== */

const database={
master:[{year:"大師",label:"歷屆藝術大師",winners:[
{role:"大師",name:"許坤成"},
{role:"大師",name:"古東玄"},
{role:"大師",name:"張家豪"},
]}],
newbie:[],
impression:[]
};

let currentCat="master";

function getGradient(name){
const colors=[["#a68d5e","#d4af37"],["#003366","#0056b3"],["#E60012","#ff4d4d"]];
let idx=name.length%colors.length;
return `linear-gradient(135deg,${colors[idx][0]},${colors[idx][1]})`;
}

function renderData(data){
const list=document.getElementById("contentList");
list.innerHTML="";
data.forEach(item=>{
const row=document.createElement("div");
row.className="year-row";
row.innerHTML=`<div class="year-label">${item.label}</div>`;
const grid=document.createElement("div");
grid.className="winners-grid";
item.winners.forEach(w=>{
grid.innerHTML+=`
<div class="winner-card">
<span class="tag tag-${w.role}">${w.role}</span>
<div class="avatar" style="background:${getGradient(w.name)}">${w.name[0]}</div>
<div class="name">${w.name}</div>
</div>`;
});
row.appendChild(grid);
list.appendChild(row);
});
}

function switchCategory(cat){
currentCat=cat;
document.querySelectorAll(".btn-tab").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");
renderData(database[cat]);
}

function handleSearch(){
let val=document.getElementById("artistSearch").value;
const filtered=database[currentCat].map(group=>{
const winners=group.winners.filter(w=>w.name.includes(val));
return winners.length?{...group,winners}:null;
}).filter(i=>i);
renderData(filtered);
}

window.onload=()=>renderData(database.master);
</script>

</body>
</html>
