<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>展覽動態｜聯邦藝術中心 Union Art Center</title>
    <style>
        /* ===== 0. 全域設定與變數 ===== */
        :root {
            --ubot-red: #E60012;
            --ubot-blue: #003366;
            --ubot-light-blue: #EAF6FC;
            --ubot-sky-blue: #00A1E9;
            --text-dark: #333333;
            --text-gray: #666666;
            --border-color: #D1CDC4;
        }

        body {
            margin: 0;
            font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #f8fbfd;
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* ===== 1. 頁首導覽列 ===== */
        header {
            background: #ffffff;
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
        }

        .logo a {
            font-size: 20px;
            font-weight: 800;
            color: var(--ubot-blue);
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .logo a::before { 
            content: ""; width: 8px; height: 8px; background: var(--ubot-red); 
            border-radius: 50%; margin-right: 8px; 
        }

        .menu {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .menu a {
            text-decoration: none;
            color: #666;
            font-weight: 600;
            font-size: 15px;
            padding: 8px 12px;
            transition: 0.3s;
        }

        .menu a:hover, .menu a.active { color: var(--ubot-red); }

        /* ===== 2. 展覽動態樣式 ===== */
        .page-banner {
            width: 100%;
            height: 250px;
            background: linear-gradient(rgba(0,51,102,0.6), rgba(0,51,102,0.6)),
                        url('https://images.unsplash.com/photo-1531050171669-70c47aca81b9?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            margin: -40px auto 80px;
            padding: 0 20px;
        }

        .ex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .ex-card {
            background: white;
            border-radius: 15px;
            padding: 35px 25px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.07);
            display: flex;
            flex-direction: column;
            border-top: 6px solid var(--ubot-sky-blue);
            transition: 0.3s;
        }
        .ex-card:hover { transform: translateY(-5px); }

        .status-tag {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 15px;
            background: var(--ubot-blue);
            color: white;
            align-self: flex-start;
            letter-spacing: 1px;
        }

        .batch-label { font-size: 14px; color: var(--ubot-red); font-weight: 700; margin-bottom: 8px; }
        .ex-date { font-size: 26px; font-weight: 800; color: var(--ubot-blue); margin-bottom: 15px; letter-spacing: -0.5px; }
        .ex-location { font-size: 22px; font-weight: 700; color: #333; margin-bottom: 30px; }

        /* 按鈕群組 */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: auto;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 0;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 15px;
            transition: 0.3s;
        }

        .btn-calendar {
            background: var(--ubot-blue);
            color: white;
        }

        .btn-calendar:hover {
            background: var(--ubot-sky-blue);
        }

        .btn-detail {
            background: white;
            color: var(--ubot-blue);
            border: 1.5px solid var(--ubot-blue);
        }

        .btn-detail:hover {
            background: var(--ubot-light-blue);
        }

        /* 狀態色彩變更 */
        .status-past { background: #999 !important; }
        .status-now { background: var(--ubot-red) !important; animation: pulse 2s infinite; }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* 已結束狀態樣式優化 */
        .ex-card.past { opacity: 0.75; filter: grayscale(0.5); border-top-color: #ccc; }
        .ex-card.past .btn { pointer-events: none; background: #eee; color: #888; border: none; }

        footer {
            background: var(--ubot-blue);
            color: white;
            padding: 40px 20px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo"><a href="index.html">聯邦藝術中心</a></div>
        <ul class="menu">
            <li><a href="about.html">關於我們</a></li>
            <li><a href="artists.html">藝術家</a></li>
            <li><a href="artworks.html">作品總覽</a></li>
            <li><a href="events.html" class="active">展覽動態</a></li>
            <li><a href="visit.html">參觀資訊</a></li>
        </ul>
    </nav>
</header>

<section class="page-banner">
    <h1>展覽動態</h1>
    <p>2026 UNION ART EXHIBITION SCHEDULE</p>
</section>

<main class="container">
    <div class="ex-grid">
        
        <div class="ex-card past">
            <span class="status-tag status-past">展覽已結束</span>
            <span class="batch-label">【第一梯次】</span>
            <span class="ex-date">01.06 - 02.13</span>
            <div class="ex-location">聯邦藝術中心</div>
            <div class="btn-group">
                <a href="#" class="btn">本梯次已結束</a>
            </div>
        </div>

        <div class="ex-card">
            <span class="status-tag status-now">展覽進行中</span>
            <span class="batch-label">【第二梯次】</span>
            <span class="ex-date">03.06 - 03.17</span>
            <div class="ex-location">聯邦藝術中心</div>
            <div class="btn-group">
                <a href="#" class="btn btn-calendar">📅 加入行事曆</a>
                <a href="detail.html" class="btn btn-detail">🔍 查看詳細資訊</a>
            </div>
        </div>

        <div class="ex-card">
            <span class="status-tag">預計展出</span>
            <span class="batch-label">【第三梯次】</span>
            <span class="ex-date">03.21 - 04.01</span>
            <div class="ex-location">聯邦藝術中心</div>
            <div class="btn-group">
                <a href="#" class="btn btn-calendar">📅 加入行事曆</a>
                <a href="detail.html" class="btn btn-detail">🔍 查看詳細資訊</a>
            </div>
        </div>

    </div>
</main>

<footer>
    <p>© 2026 Union Art Center 聯邦藝術中心 版權所有</p>
</footer>

</body>
</html>
