<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>美術獎項｜聯邦藝術中心 Union Art Center</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/awards.css">
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo">
            <a href="index.html">聯邦藝術中心</a>
        </div>
        <ul class="menu">
            <li><a href="about.html">關於我們</a></li>
            <li><a href="exhibitions.html">展覽動態</a></li>
            <li><a href="awards.html" class="active">美術獎項</a></li>
            <li><a href="artists.html">藝術家</a></li>
            <li><a href="artworks.html">作品總覽</a></li>
            <li><a href="visit.html">參觀資訊</a></li>
            <li><a href="contact.html">聯絡我們</a></li>
        </ul>
    </nav>
</header>

<section class="page-banner">
    <h1>美術獎項</h1>
    <p>Art Awards & Exhibition Rules</p>
</section>

<div class="tab-container">
    <button class="tab-button active" data-tab="rules-1">新人獎簡章</button>
    <button class="tab-button" data-tab="rules-2">印象大獎簡章</button>
    <button class="tab-button" data-tab="register">線上報名</button>
    <button class="tab-button" data-tab="query">報名查詢</button>
</div>

<!-- ===== TAB 內容區 ===== -->

<div id="rules-1" class="tab-content active">
    <div class="section-card">
        <h1 class="page-title">第二十九屆「聯邦美術新人獎」簡章</h1>
        <p>（簡章內容保留你原本的完整文字即可，這裡我省略避免訊息過長）</p>
    </div>
</div>

<div id="rules-2" class="tab-content">
    <div class="section-card">
        <h1 class="page-title">第二十四屆「聯邦美術印象大獎」簡章</h1>
        <p>（同上，把你原本完整內容貼進來即可）</p>
    </div>
</div>

<div id="register" class="tab-content">
    <div class="form-section">
        <h1 class="page-title">聯邦美術比賽報名</h1>

        <form>
            <div class="form-group">
                <label>比賽項目</label>
                <select required>
                    <option value="">請選擇</option>
                    <option>第二十九屆聯邦美術新人獎</option>
                    <option>第二十四屆聯邦美術印象大獎</option>
                </select>
            </div>

            <div class="form-group">
                <label>中文姓名</label>
                <input type="text" required>
            </div>

            <div class="form-group">
                <label>電子信箱</label>
                <input type="email" required>
            </div>

            <button type="submit" class="btn-submit">提交報名</button>
        </form>
    </div>
</div>

<div id="query" class="tab-content">
    <div class="section-card">
        <h1 class="page-title">報名查詢</h1>

        <div class="form-group">
            <label>身分證字號</label>
            <input type="text">
        </div>

        <button class="btn-submit">立即查詢</button>
    </div>
</div>

<footer>
    <div class="footer-container">
        <div>
            <div class="footer-logo">UNION ART CENTER</div>
            <p>台北市大安區忠孝東路四段219號</p>
            <p>(02) 2536-9999</p>
        </div>
    </div>

    <div class="footer-bottom">
        © 2026 Union Art Center 聯邦藝術中心
    </div>
</footer>

<!-- JS -->
<script src="js/awards.js"></script>

</body>
</html>
